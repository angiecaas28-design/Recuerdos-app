<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nuestros Recuerdos 💕</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body{
  margin:0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg,#ffdde1,#ee9ca7);
  text-align:center;
}

.container{
  padding:20px;
}

input,button{
  padding:10px;
  margin:5px;
  border-radius:10px;
  border:none;
}

button{
  background:#ff4d6d;
  color:white;
  cursor:pointer;
}

button:hover{
  background:#ff1e4d;
}

#galeria{
  display:grid;
  grid-template-columns: repeat(auto-fit, minmax(180px,1fr));
  gap:15px;
  margin-top:20px;
}

.card{
  background:white;
  padding:10px;
  border-radius:15px;
  box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

.card img{
  width:100%;
  border-radius:10px;
}

#app{
  display:none;
}
</style>
</head>
<body>

<div id="login" class="container">
  <h2>Bienvenida a nuestro mundo 💖</h2>
  <input type="password" id="password" placeholder="Contraseña">
  <button onclick="verificar()">Entrar</button>
</div>

<div id="app" class="container">
  <h2>💕 Nuestros Recuerdos 💕</h2>
  <h3 id="contador"></h3>

  <input type="file" id="foto">
  <input type="text" id="mensaje" placeholder="Escribe algo bonito...">
  <button onclick="guardarRecuerdo()">Guardar Recuerdo</button>

  <div id="galeria"></div>
</div>

<script>
const CONTRASEÑA = "amor2025"; // puedes cambiarla

function verificar(){
  const pass = document.getElementById("password").value;
  if(pass === CONTRASEÑA){
    document.getElementById("login").style.display="none";
    document.getElementById("app").style.display="block";
  }else{
    alert("Contraseña incorrecta 💔");
  }
}

// CONTADOR
const fechaInicio = new Date("2025-02-28");

function actualizarContador(){
  const hoy = new Date();
  const diff = hoy - fechaInicio;

  const dias = Math.floor(diff/(1000*60*60*24));
  const meses = Math.floor(dias/30);

  document.getElementById("contador").innerText =
    `Juntos ${meses} meses y ${dias} días 💕`;
}

setInterval(actualizarContador,1000);
actualizarContador();

// SUPABASE
const SUPABASE_URL = "PEGA_AQUI_TU_URL";
const SUPABASE_KEY = "PEGA_AQUI_TU_PUBLIC_KEY";
const supabaseClient = supabase.createClient(SUPABASE_URL,SUPABASE_KEY);

async function guardarRecuerdo(){
  const file = document.getElementById("foto").files[0];
  const texto = document.getElementById("mensaje").value;

  if(!file || !texto){
    alert("Agrega foto y mensaje 💕");
    return;
  }

  const nombreArchivo = Date.now()+"_"+file.name;

  await supabaseClient.storage
    .from("imagenes")
    .upload(nombreArchivo,file);

  const { data } = supabaseClient.storage
    .from("imagenes")
    .getPublicUrl(nombreArchivo);

  await supabaseClient
    .from("recuerdos")
    .insert([{ mensaje:texto, imagen:data.publicUrl }]);

  document.getElementById("mensaje").value="";
  document.getElementById("foto").value="";

  cargarRecuerdos();
}

async function cargarRecuerdos(){
  const { data } = await supabaseClient
    .from("recuerdos")
    .select("*")
    .order("created_at",{ascending:false});

  const galeria = document.getElementById("galeria");
  galeria.innerHTML="";

  data.forEach(r=>{
    galeria.innerHTML += `
      <div class="card">
        <img src="${r.imagen}">
        <p>${r.mensaje}</p>
      </div>
    `;
  });
}

cargarRecuerdos();
</script>

</body>
</html>
