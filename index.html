<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Recuerdos de Nosotras 💖</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="manifest.json">
</head>

<body style="margin:0; background:#ffc0cb; display:flex; justify-content:center; align-items:center; height:100vh; font-family:Arial;">

  <div style="width:360px; height:640px; background:white; border-radius:30px; padding:20px; box-shadow:0 0 30px rgba(0,0,0,0.2); text-align:center; overflow:auto;">
    
    <h1>🐻 Nuestro Amor 🐻</h1>
    <p>Un espacio con nuestros recuerdos 💕</p>

    <input type="file" id="fotoInput">
    <br><br>
    <img id="preview" width="200">

    <br><br>
    <button onclick="guardarRecuerdo()" style="padding:10px 20px; background:#ff69b4; border:none; color:white; border-radius:20px;">
      Guardar Recuerdo 💗
    </button>

  </div>

  <script>
    const input = document.getElementById("fotoInput");
    const preview = document.getElementById("preview");

    input.addEventListener("change", function() {
      const file = this.files[0];
      const reader = new FileReader();
      reader.onload = function() {
        preview.src = reader.result;
      }
      reader.readAsDataURL(file);
    });

    function guardarRecuerdo() {
      localStorage.setItem("fotoGuardada", preview.src);
      alert("Recuerdo guardado 💖");
    }

    window.onload = function() {
      const guardada = localStorage.getItem("fotoGuardada");
      if (guardada) {
        preview.src = guardada;
      }
    }

    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("service-worker.js");
    }
  </script>

</body>
</html>
