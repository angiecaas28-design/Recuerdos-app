<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nuestros Recuerdos 💕</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body{
  margin:0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg,#ffdde1,#ee9ca7);
  text-align:center;
}

.container{
  padding:20px;
}

input,button{
  padding:10px;
  margin:5px;
  border-radius:10px;
  border:none;
}

button{
  background:#ff4d6d;
  color:white;
  cursor:pointer;
}

button:hover{
  background:#ff1e4d;
}

/* GALERÍA ESTILO ALBÚM */
#galeria{
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 15px;
  margin-top: 20px;
}

.card{
  background: white;
  border-radius: 15px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.2);
  overflow: hidden;
  cursor: pointer;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.card img{
  width: 100%;
  height: 180px;
  object-fit: cover;
  border-bottom: 1px solid #ddd;
}

.card p{
  padding: 5px 10px;
  text-align: center;
  font-size: 14px;
}

/* Modal para imagen grande */
#modal{
  display:none;
  position:fixed;
  top:0; left:0; right:0; bottom:0;
  background: rgba(0,0,0,0.8);
  justify-content:center;
  align-items:center;
  z-index:1000;
}

#modal img{
  max-width:90%;
  max-height:90%;
  border-radius:10px;
}

#app{
  display:none;
}
</style>
</head>
<body>

<div id="login" class="container">
  <h2>Bienvenida a nuestro mundo 💖</h2>
  <input type="password" id="password" placeholder="Contraseña">
  <button onclick="verificar()">Entrar</button>
</div>

<div id="app" class="container">
  <h2>💕 Nuestros Recuerdos 💕</h2>
  <h3 id="contador"></h3>

  <input type="file" id="foto">
  <input type="text" id="mensaje" placeholder="Escribe algo bonito...">
  <button onclick="guardarRecuerdo()">Guardar Recuerdo</button>

  <div id="galeria"></div>
</div>

<!-- Modal para imagen grande -->
<div id="modal" onclick="cerrarModal()">
  <img id="imagenModal" src="">
</div>

<script>
const CONTRASEÑA = "amor2025";

function verificar(){
  const pass = document.getElementById("password").value;
  if(pass === CONTRASEÑA){
    document.getElementById("login").style.display="none";
    document.getElementById("app").style.display="block";
  }else{
    alert("Contraseña incorrecta 💔");
  }
}

// CONTADOR
const fechaInicio = new Date("2025-02-28");
function actualizarContador(){
  const hoy = new Date();
  const diff = hoy - fechaInicio;

  const dias = Math.floor(diff/(1000*60*60*24));
  const meses = Math.floor(dias/30);

  document.getElementById("contador").innerText =
    `Juntos ${meses} meses y ${dias} días 💕`;
}
setInterval(actualizarContador,1000);
actualizarContador();

// SUPABASE
const SUPABASE_URL = "https://dsorebgngxinberagixf.supabase.co";
const SUPABASE_KEY = "TU_ANON_KEY_AQUI"; // reemplaza con tu key pública
const supabaseClient = supabase.createClient(SUPABASE_URL,SUPABASE_KEY);

// Guardar recuerdo
async function guardarRecuerdo(){
  const file = document.getElementById("foto").files[0];
  const texto = document.getElementById("mensaje").value;

  if(!file || !texto){
    alert("Agrega foto y mensaje 💕");
    return;
  }

  const nombreArchivo = Date.now()+"_"+file.name;

  // Subir imagen
  await supabaseClient.storage
    .from("imagenes")
    .upload(nombreArchivo,file);

  const { data } = supabaseClient.storage
    .from("imagenes")
    .getPublicUrl(nombreArchivo);

  // Guardar en tabla
  const { data: nuevoRecuerdo } = await supabaseClient
    .from("recuerdos")
    .insert([{ mensaje:texto, imagen:data.publicUrl }])
    .select(); // obtenemos el registro recién insertado

  // Limpiar inputs
  document.getElementById("mensaje").value="";
  document.getElementById("foto").value="";

  // Mostrar inmediatamente el nuevo recuerdo en la galería
  mostrarRecuerdo(nuevoRecuerdo[0]);
}

// Mostrar un solo recuerdo en la galería
function mostrarRecuerdo(r){
  const galeria = document.getElementById("galeria");
  const card = document.createElement("div");
  card.className = "card";
  card.innerHTML = `<img src="${r.imagen}" alt="${r.mensaje}"><p>${r.mensaje}</p>`;
  card.onclick = ()=> abrirModal(r.imagen);
  galeria.prepend(card); // lo pone primero en la galería
}

// Cargar todos los recuerdos
async function cargarRecuerdos(){
  const { data } = await supabaseClient
    .from("recuerdos")
    .select("*")
    .order("created_at",{ascending:false});

  const galeria = document.getElementById("galeria");
  galeria.innerHTML="";

  data.forEach(r=>{
    mostrarRecuerdo(r);
  });
}

// Modal funciones
function abrirModal(src){
  document.getElementById("imagenModal").src = src;
  document.getElementById("modal").style.display="flex";
}
function cerrarModal(){
  document.getElementById("modal").style.display="none";
}

// AUTO REFRESH cada 5 segundos para ver los recuerdos de otros dispositivos
setInterval(cargarRecuerdos, 5000);

cargarRecuerdos();
</script>

</body>
</html>
