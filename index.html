<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nuestros Recuerdos 💕</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body{
  margin:0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg,#ffdde1,#ee9ca7);
  text-align:center;
}

.container{
  padding:20px;
}

input,button{
  padding:10px;
  margin:5px;
  border-radius:10px;
  border:none;
}

button{
  background:#ff4d6d;
  color:white;
  cursor:pointer;
}

button:hover{
  background:#ff1e4d;
}

#galeria{
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 15px;
  margin-top: 20px;
}

.card{
  background: white;
  border-radius: 15px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.2);
  overflow: hidden;
  cursor: pointer;
  display: flex;
  flex-direction: column;
  align-items: center;
  position: relative;
}

.card img{
  width: 100%;
  height: 180px;
  object-fit: cover;
  border-bottom: 1px solid #ddd;
}

.card p{
  padding: 5px 10px;
  text-align: center;
  font-size: 14px;
}

.delete-btn{
  position: absolute;
  top:5px;
  right:5px;
  background:red;
  color:white;
  border:none;
  border-radius:50%;
  width:25px;
  height:25px;
  font-weight:bold;
  cursor:pointer;
}

#modal{
  display:none;
  position:fixed;
  top:0; left:0; right:0; bottom:0;
  background: rgba(0,0,0,0.8);
  justify-content:center;
  align-items:center;
  z-index:1000;
}

#modal img{
  max-width:90%;
  max-height:90%;
  border-radius:10px;
}

#app{
  display:none;
}
</style>
</head>
<body>

<div id="login" class="container">
  <h2>Bienvenida a nuestro mundo 💖</h2>
  <input type="password" id="password" placeholder="Contraseña">
  <button onclick="verificar()">Entrar</button>
</div>

<div id="app" class="container">
  <h2>💕 Nuestros Recuerdos 💕</h2>
  <h3 id="contador"></h3>

  <input type="file" id="foto">
  <input type="text" id="mensaje" placeholder="Escribe algo bonito...">
  <button onclick="guardarRecuerdo()">Guardar Recuerdo</button>

  <div id="galeria"></div>
</div>

<div id="modal" onclick="cerrarModal()">
  <img id="imagenModal" src="">
</div>

<script>
const CONTRASEÑA = "amor2025";

function verificar(){
  const pass = document.getElementById("password").value;
  if(pass === CONTRASEÑA){
    document.getElementById("login").style.display="none";
    document.getElementById("app").style.display="block";
  }else{
    alert("Contraseña incorrecta 💔");
  }
}

// CONTADOR
const fechaInicio = new Date("2025-02-28");
function actualizarContador(){
  const hoy = new Date();
  const diff = hoy - fechaInicio;
  const dias = Math.floor(diff/(1000*60*60*24));
  const meses = Math.floor(dias/30);
  document.getElementById("contador").innerText =
    `Juntos ${meses} meses y ${dias} días 💕`;
}
setInterval(actualizarContador,1000);
actualizarContador();

// SUPABASE
const SUPABASE_URL = "https://dsorebgngxinberagixf.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRzb3JlYmduZ3hpbmJlcmFnaXhmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1NDY0NjEsImV4cCI6MjA4ODEyMjQ2MX0.WRuj1_f5eorGTUVeUIQebzkY1UgLJu0gYYDwOYD1Hug";
const supabaseClient = supabase.createClient(SUPABASE_URL,SUPABASE_KEY);

// Guardar recuerdo
async function guardarRecuerdo(){
  const file = document.getElementById("foto").files[0];
  const texto = document.getElementById("mensaje").value;

  if(!file || !texto){
    alert("Agrega foto y mensaje 💕");
    return;
  }

  const nombreArchivo = Date.now()+"_"+file.name;

  // Subir imagen
  const { error: uploadError } = await supabaseClient.storage
    .from("imagenes")
    .upload(nombreArchivo,file);

  if(uploadError){
    alert("Error al subir la imagen: " + uploadError.message);
    return;
  }

  const { data } = supabaseClient.storage
    .from("imagenes")
    .getPublicUrl(nombreArchivo);

  const urlImagen = data.publicUrl; // URL pública correcta

  // Guardar en tabla
  const { data: nuevoRecuerdo, error: insertError } = await supabaseClient
    .from("recuerdos")
    .insert([{ mensaje:texto, imagen:urlImagen }])
    .select();

  if(insertError){
    alert("Error al guardar el recuerdo: " + insertError.message);
    return;
  }

  document.getElementById("mensaje").value="";
  document.getElementById("foto").value="";

  mostrarRecuerdo(nuevoRecuerdo[0]);
}

// Mostrar recuerdo
function mostrarRecuerdo(r){
  const galeria = document.getElementById("galeria");
  if(document.getElementById(`recuerdo-${r.id}`)) return;

  const card = document.createElement("div");
  card.className = "card";
  card.id = `recuerdo-${r.id}`;
  card.innerHTML = `
    <img src="${r.imagen}" alt="${r.mensaje}">
    <p>${r.mensaje}</p>
    <button class="delete-btn" onclick="eliminarRecuerdo(${r.id}, '${r.imagen}')">×</button>
  `;
  card.onclick = (e)=>{
    if(e.target.classList.contains('delete-btn')) return;
    abrirModal(r.imagen);
  }
  galeria.prepend(card);
}

// Eliminar recuerdo
async function eliminarRecuerdo(id, imagen){
  const confirmar = confirm("¿Seguro que quieres eliminar este recuerdo? 💔");
  if(!confirmar) return;

  await supabaseClient.from("recuerdos").delete().eq("id", id);

  const nombreArchivo = imagen.split("/").pop();
  await supabaseClient.storage.from("imagenes").remove([nombreArchivo]);

  const card = document.getElementById(`recuerdo-${id}`);
  if(card) card.remove();
}

// Cargar recuerdos al iniciar
async function cargarRecuerdos(){
  const { data } = await supabaseClient.from("recuerdos")
    .select("*")
    .order("created_at",{ascending:false});
  const galeria = document.getElementById("galeria");
  galeria.innerHTML="";
  data.forEach(r=> mostrarRecuerdo(r));
}

// Modal
function abrirModal(src){
  document.getElementById("imagenModal").src = src;
  document.getElementById("modal").style.display="flex";
}
function cerrarModal(){
  document.getElementById("modal").style.display="none";
}

// SUSCRIPCIÓN TIEMPO REAL
supabaseClient
  .channel('recuerdos_channel')
  .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'recuerdos' }, (payload) => {
    mostrarRecuerdo(payload.new);
  })
  .on('postgres_changes', { event: 'DELETE', schema: 'public', table: 'recuerdos' }, (payload) => {
    const card = document.getElementById(`recuerdo-${payload.old.id}`);
    if(card) card.remove();
  })
  .subscribe();

cargarRecuerdos();
</script>

</body>
</html>
