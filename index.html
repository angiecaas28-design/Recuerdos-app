<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recuerdos de Nosotras 💖</title>
<link rel="manifest" href="manifest.json">

<style>
body{
  margin:0;
  background:#ffc0cb;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  font-family:Arial;
}

.app{
  width:360px;
  height:640px;
  background:white;
  border-radius:30px;
  padding:20px;
  box-shadow:0 0 30px rgba(0,0,0,0.2);
  overflow:auto;
  text-align:center;
}

button{
  padding:10px 20px;
  background:#ff69b4;
  border:none;
  color:white;
  border-radius:20px;
  margin-top:10px;
  cursor:pointer;
}

input, textarea{
  width:100%;
  margin-top:8px;
  padding:8px;
  border-radius:10px;
  border:1px solid #ccc;
}

.galeria{
  display:grid;
  grid-template-columns: repeat(2, 1fr);
  gap:12px;
  margin-top:20px;
}

.card{
  background:#ffe4ec;
  padding:8px;
  border-radius:15px;
}

.card img{
  width:100%;
  border-radius:10px;
}

.card p{
  font-size:12px;
  margin-top:5px;
}

.contador{
  background:#ffe4ec;
  padding:10px;
  border-radius:15px;
  margin-bottom:15px;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="app" id="loginScreen">
  <h2>🔒 Nuestra App Secreta 💕</h2>
  <input type="password" id="passwordInput" placeholder="Ingresa la contraseña">
  <button onclick="verificarPassword()">Entrar 💖</button>
</div>

<div class="app" id="appScreen" style="display:none;">
  <h2>🐻 Nuestro Amor 🐻</h2>

  <div class="contador" id="contador"></div>

  <h3>Agregar Recuerdo 💕</h3>
  <input type="file" id="fotoInput">
  <textarea id="mensajeInput" placeholder="Escribe algo bonito sobre este recuerdo..."></textarea>
  <button onclick="guardarRecuerdo()">Guardar Recuerdo 💗</button>

  <div class="galeria" id="galeria"></div>
</div>

<script>
const passwordCorrecta = "TE AMITO";
const fechaAniversario = new Date("2025-02-28");

function verificarPassword(){
  const input = document.getElementById("passwordInput").value;
  if(input === passwordCorrecta){
    document.getElementById("loginScreen").style.display = "none";
    document.getElementById("appScreen").style.display = "block";
    cargarRecuerdos();
    actualizarContador();
  } else {
    alert("Contraseña incorrecta 💔");
  }
}

function actualizarContador(){
  const hoy = new Date();
  const diferencia = hoy - fechaAniversario;
  const dias = Math.floor(diferencia / (1000 * 60 * 60 * 24));
  document.getElementById("contador").innerHTML =
    "💖 Llevamos " + dias + " días juntos desde el 28/02/2025 💕";
}

function guardarRecuerdo(){
  const file = document.getElementById("fotoInput").files[0];
  const mensaje = document.getElementById("mensajeInput").value;

  if(!file){
    alert("Selecciona una foto 💕");
    return;
  }

  const reader = new FileReader();
  reader.onload = function(){
    let recuerdos = JSON.parse(localStorage.getItem("recuerdos")) || [];
    recuerdos.push({
      imagen: reader.result,
      texto: mensaje
    });

    localStorage.setItem("recuerdos", JSON.stringify(recuerdos));
    cargarRecuerdos();

    document.getElementById("fotoInput").value = "";
    document.getElementById("mensajeInput").value = "";
  }
  reader.readAsDataURL(file);
}

function cargarRecuerdos(){
  const galeria = document.getElementById("galeria");
  galeria.innerHTML = "";

  let recuerdos = JSON.parse(localStorage.getItem("recuerdos")) || [];

  recuerdos.forEach(recuerdo=>{
    const card = document.createElement("div");
    card.className = "card";

    const img = document.createElement("img");
    img.src = recuerdo.imagen;

    const texto = document.createElement("p");
    texto.textContent = recuerdo.texto;

    card.appendChild(img);
    card.appendChild(texto);
    galeria.appendChild(card);
  });
}

if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("service-worker.js");
}
</script>

</body>
</html>
